name: Deploy Preprocess Service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # PRs: group per-PR and cancel in-flight so rapid pushes don't stack up
  # redundant preview builds. Pushes: group per-ref without cancel so back-
  # to-back merges serialize cleanly through dev → prod.
  group: preprocess-deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Unit tests + lint run on both push and pull_request so a PR surfaces any
  # breakage before merge. Integration tests (real Vision + Anthropic against
  # the fixture images) are NOT run in CI — fixtures are gitignored, and
  # running them would require the deferred GCS bucket. Smoke tests against
  # the deployed URL cover end-to-end pipeline validation.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest tests/unit --cov=app --cov-report=term-missing --cov-fail-under=80

  # ---------------------------------------------------------------------------
  # PR preview path (PRs targeting main, from branches in this repo).
  #
  # Each PR gets a stable `pr-<N>` tagged revision on the dev Cloud Run
  # service. Smoke runs against the same preview URL that a human QA's
  # against. Traffic-serving dev (main's HEAD) is untouched. Fork PRs are
  # skipped because they can't access WIF/OIDC secrets.
  #
  # Teardown lives in `preview-cleanup.yml` on `pull_request: closed`.
  # ---------------------------------------------------------------------------
  deploy-preview:
    needs: test
    if: |
      github.event_name == 'pull_request'
      && github.base_ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      preview_url: ${{ steps.capture.outputs.preview_url }}
      preview_tag: ${{ steps.capture.outputs.preview_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        env:
          IMAGE: gcr.io/neonbinder-dev/neonbinder-preprocess
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # `:pr-<N>` is the stable tag referenced by the Cloud Run deploy.
          # `:<head-sha>` is here for merge-to-main artifact promotion: the
          # push-to-main workflow can look up this exact image by SHA and
          # re-tag/push it to the prod GCR without rebuilding.
          docker build \
            -t "$IMAGE:pr-$PR_NUMBER" \
            -t "$IMAGE:$HEAD_SHA" \
            .
          docker push "$IMAGE:pr-$PR_NUMBER"
          docker push "$IMAGE:$HEAD_SHA"

      - name: Deploy tagged no-traffic preview to dev Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-preprocess
          region: us-central1
          image: gcr.io/neonbinder-dev/neonbinder-preprocess:pr-${{ github.event.pull_request.number }}
          project_id: neonbinder-dev
          env_vars: ENVIRONMENT=dev
          no_traffic: true
          tag: pr-${{ github.event.pull_request.number }}

      - id: capture
        name: Capture preview URL
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          TAG="pr-$PR"
          TAGGED_URL=$(gcloud run services describe neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder-dev \
            --format=json \
            | jq -r ".status.traffic[] | select(.tag == \"$TAG\") | .url")
          if [ -z "$TAGGED_URL" ] || [ "$TAGGED_URL" = "null" ]; then
            echo "ERROR: preview URL for tag=$TAG not found on service."
            exit 1
          fi
          echo "preview_url=$TAGGED_URL" >> $GITHUB_OUTPUT
          echo "preview_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Preview URL: $TAGGED_URL"

  preview-smoke:
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch internal API key (dev)
        run: |
          echo "::add-mask::$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder-dev)"
          echo "SMOKE_INTERNAL_KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder-dev)" >> $GITHUB_ENV

      - name: Run smoke tests against preview
        env:
          SMOKE_TARGET_URL: ${{ needs.deploy-preview.outputs.preview_url }}
        run: pytest tests/smoke -v

  # Sticky PR comment with preview URL + check results. Runs regardless of
  # whether deploy/smoke succeeded so a failure still leaves a trace on the
  # PR pointing at the workflow run.
  comment-preview:
    needs: [deploy-preview, preview-smoke]
    if: |
      always()
      && github.event_name == 'pull_request'
      && github.base_ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Sticky preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          URL: ${{ needs.deploy-preview.outputs.preview_url }}
          TAG: ${{ needs.deploy-preview.outputs.preview_tag }}
          DEPLOY_RESULT: ${{ needs.deploy-preview.result }}
          SMOKE_RESULT: ${{ needs.preview-smoke.result }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          status() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              cancelled) echo "CANCELLED" ;;
              skipped) echo "skipped" ;;
              *) echo "$1" ;;
            esac
          }

          URL_LINE="not deployed — see workflow run"
          if [ "$DEPLOY_RESULT" = "success" ] && [ -n "$URL" ]; then
            URL_LINE="$URL"
          fi

          cat > body.md <<EOF
          <!-- neonbinder-preprocess-preview-marker -->
          ## Preprocess service preview

          **URL:** $URL_LINE
          **Tag:** \`$TAG\`

          **Checks**
          - Deploy: $(status "$DEPLOY_RESULT")
          - Smoke: $(status "$SMOKE_RESULT")

          Preview auto-updates on each push to this PR and is torn down when the PR closes. [Workflow run]($RUN_URL)
          EOF

          # Find existing sticky comment by HTML marker, or create a new one.
          EXISTING=$(gh api "repos/$REPO/issues/$PR/comments" \
            --paginate \
            --jq '.[] | select(.body | contains("neonbinder-preprocess-preview-marker")) | .id' \
            | head -n 1)

          if [ -n "$EXISTING" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING" -f body="$(cat body.md)" > /dev/null
            echo "Updated sticky comment $EXISTING."
          else
            gh api --method POST "repos/$REPO/issues/$PR/comments" -f body="$(cat body.md)" > /dev/null
            echo "Created sticky comment."
          fi

  # ---------------------------------------------------------------------------
  # Push-to-main unified flow.
  #
  #   test → build-push → deploy-dev → dev-smoke
  #                                        │
  #                           ┌─────────────┴─────────────┐
  #                        (success)                   (failure)
  #                           │                            │
  #                      deploy-prod                  dev-rollback
  #                           │
  #                      prod-smoke
  #                           │
  #                      prod-promote
  #
  # Build happens ONCE; the same image SHA tag flows dev → prod. Dev gets
  # immediate 100% traffic. Prod uses blue/green (no_traffic + sha tag) so a
  # failed smoke leaves prod serving the previous revision.
  # ---------------------------------------------------------------------------

  build-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      short_sha: ${{ steps.short.outputs.short_sha }}
      deploy_tag: ${{ steps.short.outputs.deploy_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: short
        name: Compute sha tag
        run: |
          SHORT="$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "short_sha=$SHORT" >> $GITHUB_OUTPUT
          echo "deploy_tag=sha-$SHORT" >> $GITHUB_OUTPUT

      - name: Auth to dev
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR (dev)
        run: gcloud auth configure-docker --quiet

      - name: Build + push to dev GCR
        env:
          SHA: ${{ github.sha }}
        run: |
          docker build \
            -t gcr.io/neonbinder-dev/neonbinder-preprocess:$SHA \
            -t gcr.io/neonbinder-dev/neonbinder-preprocess:latest \
            .
          docker push gcr.io/neonbinder-dev/neonbinder-preprocess:$SHA
          docker push gcr.io/neonbinder-dev/neonbinder-preprocess:latest

      - name: Re-auth to prod
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER }}

      - name: Configure Docker for GCR (prod)
        run: gcloud auth configure-docker --quiet

      - name: Retag + push to prod GCR
        env:
          SHA: ${{ github.sha }}
        run: |
          # Same image bytes, new tags under the prod project path.
          docker tag gcr.io/neonbinder-dev/neonbinder-preprocess:$SHA gcr.io/neonbinder/neonbinder-preprocess:$SHA
          docker tag gcr.io/neonbinder-dev/neonbinder-preprocess:$SHA gcr.io/neonbinder/neonbinder-preprocess:latest
          docker push gcr.io/neonbinder/neonbinder-preprocess:$SHA
          docker push gcr.io/neonbinder/neonbinder-preprocess:latest

  # Dev deploy: immediate 100% traffic.
  deploy-dev:
    needs: build-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      prev_revision: ${{ steps.capture-prev.outputs.prev_revision }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: capture-prev
        name: Capture dev's currently-serving revision
        run: |
          PREV=$(gcloud run services describe neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder-dev \
            --format='value(status.traffic[0].revisionName)')
          echo "Previous dev revision: $PREV"
          echo "prev_revision=$PREV" >> $GITHUB_OUTPUT

      - name: Deploy to dev Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-preprocess
          region: us-central1
          image: gcr.io/neonbinder-dev/neonbinder-preprocess:${{ github.sha }}
          project_id: neonbinder-dev
          env_vars: ENVIRONMENT=dev

      # deploy-cloudrun@v2 only auto-routes traffic to the new revision when
      # the service's traffic config is already at `latest_revision = true`.
      # Our service history (bootstrap cloudrun/hello revision + intermittent
      # PR-preview tags) flips traffic into explicit-revision mode, so the
      # implicit latest-revision routing never fires. Force the shift
      # explicitly so dev always serves main's HEAD after a merge.
      - name: Shift dev traffic to latest revision
        run: |
          set -euo pipefail
          gcloud run services update-traffic neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder-dev \
            --to-latest

  dev-smoke:
    needs: deploy-dev
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve dev URL + fetch internal API key
        run: |
          echo "SMOKE_TARGET_URL=$(gcloud run services describe neonbinder-preprocess --project=neonbinder-dev --region=us-central1 --format='value(status.url)')" >> $GITHUB_ENV
          KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder-dev)
          echo "::add-mask::$KEY"
          echo "SMOKE_INTERNAL_KEY=$KEY" >> $GITHUB_ENV

      - name: Run smoke tests against dev
        run: pytest tests/smoke -v

  # On dev-smoke failure, roll dev traffic back to the prior revision. Prod is
  # still-not-deployed so nothing to do there.
  dev-rollback:
    needs: [deploy-dev, dev-smoke]
    if: always() && github.event_name == 'push' && needs.dev-smoke.result == 'failure' && needs.deploy-dev.outputs.prev_revision != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Roll dev traffic back to ${{ needs.deploy-dev.outputs.prev_revision }}
        run: |
          set -euo pipefail
          PREV="${{ needs.deploy-dev.outputs.prev_revision }}"
          echo "Shifting 100% of traffic on neonbinder-preprocess (dev) back to $PREV"
          gcloud run services update-traffic neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder-dev \
            --to-revisions="$PREV=100"
          echo "Rollback complete. The broken revision stays in the revision"
          echo "list (inactive) so we can inspect it, but serves no traffic."

  # Prod deploy: blue/green — land the image from build-push at 0% traffic
  # under a sha tag; prod-smoke exercises the tagged URL before promote shifts
  # traffic.
  deploy-prod:
    needs: [build-push, dev-smoke]
    if: github.event_name == 'push' && needs.dev-smoke.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      new_revision: ${{ steps.capture-new.outputs.new_revision }}
      tagged_url: ${{ steps.capture-new.outputs.tagged_url }}
      prev_revision: ${{ steps.capture-prev.outputs.prev_revision }}

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: capture-prev
        name: Capture prod's currently-serving revision
        run: |
          PREV=$(gcloud run services describe neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder \
            --format='value(status.traffic[0].revisionName)')
          echo "Previous prod revision: $PREV"
          echo "prev_revision=$PREV" >> $GITHUB_OUTPUT

      - name: Deploy to prod Cloud Run (no_traffic + sha tag)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-preprocess
          region: us-central1
          image: gcr.io/neonbinder/neonbinder-preprocess:${{ github.sha }}
          project_id: neonbinder
          env_vars: ENVIRONMENT=prod
          no_traffic: true
          tag: ${{ needs.build-push.outputs.deploy_tag }}

      - id: capture-new
        name: Capture new prod revision + tagged URL
        env:
          TAG: ${{ needs.build-push.outputs.deploy_tag }}
        run: |
          set -euo pipefail
          NEW=$(gcloud run services describe neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder \
            --format='value(status.latestCreatedRevisionName)')
          TAGGED_URL=$(gcloud run services describe neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder \
            --format=json \
            | jq -r ".status.traffic[] | select(.tag == \"$TAG\") | .url")
          if [ -z "$TAGGED_URL" ] || [ "$TAGGED_URL" = "null" ]; then
            echo "ERROR: tagged URL for tag=$TAG not found on service."
            exit 1
          fi
          echo "new_revision=$NEW" >> $GITHUB_OUTPUT
          echo "tagged_url=$TAGGED_URL" >> $GITHUB_OUTPUT

  prod-smoke:
    needs: deploy-prod
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch internal API key (prod)
        run: |
          KEY=$(gcloud secrets versions access latest --secret=internal-api-key --project=neonbinder)
          echo "::add-mask::$KEY"
          echo "SMOKE_INTERNAL_KEY=$KEY" >> $GITHUB_ENV

      - name: Run smoke tests against prod tagged URL
        env:
          SMOKE_TARGET_URL: ${{ needs.deploy-prod.outputs.tagged_url }}
        run: pytest tests/smoke -v

  # Shifts 100% prod traffic to the new sha-tagged revision. Any prior failure
  # skips this job and the previous revision continues to serve.
  prod-promote:
    needs: [deploy-prod, prod-smoke]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_PREPROCESS }}
          service_account: ${{ secrets.GCP_SA_PREPROCESS_DEPLOYER }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Promote ${{ needs.deploy-prod.outputs.new_revision }} to 100%
        run: |
          set -euo pipefail
          gcloud run services update-traffic neonbinder-preprocess \
            --region=us-central1 \
            --project=neonbinder \
            --to-revisions="${{ needs.deploy-prod.outputs.new_revision }}=100"
          echo "Promotion complete. The sha-tag remains on the revision for later inspection."

  # Unified failure report: fires if any stage between build and promote
  # failed. Identifies the first failed stage so the issue title points at
  # the actionable step.
  report-failure:
    needs: [test, build-push, deploy-dev, dev-smoke, dev-rollback, deploy-prod, prod-smoke, prod-promote]
    if: |
      always() && github.event_name == 'push' && (
        needs.test.result == 'failure' ||
        needs.build-push.result == 'failure' ||
        needs.deploy-dev.result == 'failure' ||
        needs.dev-smoke.result == 'failure' ||
        needs.deploy-prod.result == 'failure' ||
        needs.prod-smoke.result == 'failure' ||
        needs.prod-promote.result == 'failure'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Open GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R_TEST: ${{ needs.test.result }}
          R_BUILD: ${{ needs.build-push.result }}
          R_DEV: ${{ needs.deploy-dev.result }}
          R_DEV_SMOKE: ${{ needs.dev-smoke.result }}
          R_ROLLBACK: ${{ needs.dev-rollback.result }}
          R_PROD: ${{ needs.deploy-prod.result }}
          R_PROD_SMOKE: ${{ needs.prod-smoke.result }}
          R_PROMOTE: ${{ needs.prod-promote.result }}
          NEW_REV: ${{ needs.deploy-prod.outputs.new_revision }}
          TAG: ${{ needs.build-push.outputs.deploy_tag }}
          TAGGED_URL: ${{ needs.deploy-prod.outputs.tagged_url }}
          PROD_PREV: ${{ needs.deploy-prod.outputs.prev_revision }}
          DEV_PREV: ${{ needs.deploy-dev.outputs.prev_revision }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Stop at first failure so the issue title is the actionable stage.
          if [ "$R_TEST" = "failure" ]; then STAGE=test
          elif [ "$R_BUILD" = "failure" ]; then STAGE=build-push
          elif [ "$R_DEV" = "failure" ]; then STAGE=deploy-dev
          elif [ "$R_DEV_SMOKE" = "failure" ]; then STAGE=dev-smoke
          elif [ "$R_PROD" = "failure" ]; then STAGE=deploy-prod
          elif [ "$R_PROD_SMOKE" = "failure" ]; then STAGE=prod-smoke
          elif [ "$R_PROMOTE" = "failure" ]; then STAGE=prod-promote
          else STAGE=unknown
          fi

          # Separate blast radius description per failure class.
          case "$STAGE" in
            test|build-push)
              BLAST="No infra touched. Dev and prod both still serving their previous revisions." ;;
            deploy-dev|dev-smoke)
              BLAST="Dev was redeployed and then rolled back (if dev-rollback ran successfully). Prod never touched. Dev previous revision: \`$DEV_PREV\`, rollback job result: \`$R_ROLLBACK\`." ;;
            deploy-prod|prod-smoke)
              BLAST="Dev is serving main's HEAD. Prod has a parked revision at 0% traffic (\`$NEW_REV\`, tag \`$TAG\`) and is still serving \`$PROD_PREV\`. Tagged URL for local poking: $TAGGED_URL." ;;
            prod-promote)
              BLAST="Dev is serving main's HEAD. Prod blue/green smoke passed but the traffic shift call itself failed. Re-run the promote job manually or investigate update-traffic errors." ;;
            *)
              BLAST="Unknown failure mode — check the run directly." ;;
          esac

          cat > body.md <<EOF
          Deploy workflow failed at **\`$STAGE\`** for commit ${{ github.sha }}.

          **Blast radius:** $BLAST

          **Stage results**
          | Stage | Result |
          |---|---|
          | test | \`$R_TEST\` |
          | build-push | \`$R_BUILD\` |
          | deploy-dev | \`$R_DEV\` |
          | dev-smoke | \`$R_DEV_SMOKE\` |
          | dev-rollback | \`$R_ROLLBACK\` |
          | deploy-prod | \`$R_PROD\` |
          | prod-smoke | \`$R_PROD_SMOKE\` |
          | prod-promote | \`$R_PROMOTE\` |

          **Links**
          - Deploy run: $RUN_URL

          Fix forward in a new PR; close this issue when a subsequent green deploy lands.
          EOF

          gh issue create \
            --repo neonbinder/neonbinder_preprocess \
            --title "Deploy failed at ${STAGE}: ${{ github.sha }}" \
            --body-file body.md
