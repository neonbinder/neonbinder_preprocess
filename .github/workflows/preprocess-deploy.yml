name: Deploy Preprocess Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest

  deploy:
    needs: test
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "GCP_PROJECT=neonbinder-484017" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "GCP_PROJECT=neonbinder-dev-io" >> $GITHUB_ENV
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.ENV_NAME == 'prod' && secrets.GCP_WIF_PROVIDER_PREPROCESS || secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ env.ENV_NAME == 'prod' && secrets.GCP_SA_PREPROCESS_DEPLOYER || secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            -t gcr.io/${{ env.GCP_PROJECT }}/neonbinder-preprocess:latest \
            -t gcr.io/${{ env.GCP_PROJECT }}/neonbinder-preprocess:${{ github.sha }} \
            .
          docker push gcr.io/${{ env.GCP_PROJECT }}/neonbinder-preprocess --all-tags

      - uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: neonbinder-preprocess
          region: us-central1
          image: gcr.io/${{ env.GCP_PROJECT }}/neonbinder-preprocess:${{ github.sha }}
          project_id: ${{ env.GCP_PROJECT }}
          env_vars: ENVIRONMENT=${{ env.ENV_NAME }}

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Set environment
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "GCP_PROJECT=neonbinder-484017" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "GCP_PROJECT=neonbinder-dev-io" >> $GITHUB_ENV
          fi

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.ENV_NAME == 'prod' && secrets.GCP_WIF_PROVIDER_PREPROCESS || secrets.GCP_WIF_PROVIDER_PREPROCESS_DEV }}
          service_account: ${{ env.ENV_NAME == 'prod' && secrets.GCP_SA_PREPROCESS_DEPLOYER || secrets.GCP_SA_PREPROCESS_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Resolve service URL
        run: |
          URL=$(gcloud run services describe neonbinder-preprocess \
            --region=us-central1 \
            --project=${{ env.GCP_PROJECT }} \
            --format='value(status.url)')
          echo "SMOKE_TEST_URL=$URL" >> $GITHUB_ENV

      - name: Hit /healthz
        run: |
          curl -fsS -o /dev/null -w "%{http_code}\n" "${SMOKE_TEST_URL}/healthz" | grep -q 200
