name: Preprocess CI

# NOTE: deploy + smoke-test jobs are intentionally absent. They will be
# restored once neonbinder_browser and neonbinder_terraform finish converting
# to trunk-based deploys with per-PR preview revisions; the preprocess
# workflow will then mirror the browser service's final shape rather than
# diverging from it. Until that lands, this file only runs lint + unit tests.

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest tests/unit --cov=app --cov-report=term-missing
